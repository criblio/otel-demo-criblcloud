# Helm values to configure OpenTelemetry demo with Cribl Stream integration
# This file will be processed by the setup script to substitute variables

# Override individual components with Cribl-built images. Tags are tied to
# commits on long-lived branches in criblio/opentelemetry-demo (see
# docs/opentelemetry-demo-fork.md). For local dev, the image must be built
# and loaded into the kind cluster (kind load docker-image ...) before
# deploy; for shared environments, the image must exist on GHCR.
components:
  load-generator:
    imageOverride:
      repository: ghcr.io/criblio/opentelemetry-demo
      tag: b18ffba-load-generator
      pullPolicy: IfNotPresent
    # Browser traffic is heavy in kind — keeps PlaywrightUser disabled.
    env:
      - name: LOCUST_BROWSER_TRAFFIC_ENABLED
        value: "false"

  # Lower memory ceiling than the (unset) chart default — product-catalog is
  # a Go service whose footprint matters in the local kind cluster.
  product-catalog:
    resources:
      limits:
        memory: 128Mi
      requests:
        memory: 128Mi

opentelemetry-collector:
  config:
    exporters:
      # Base chart exporters that pipelines reference
      otlp:
        endpoint: jaeger:4317
        tls:
          insecure: true
      debug: {}
      opensearch:
        http:
          endpoint: http://opensearch:9200
          tls:
            insecure: true
        logs_index: otel
      otlphttp/prometheus:
        endpoint: http://prometheus:9090/api/v1/otlp
        tls:
          insecure: true
      # Cribl Stream exporter
      otlp/cribl:
        endpoint: "https://__CRIBL_ENDPOINT__"
        headers:
          authorization: "Basic __AUTH_HEADER__"
        tls:
          insecure: false
    
    service:
      pipelines:
        traces:
          exporters:
            - otlp
            - debug
            - spanmetrics
            - otlp/cribl  # Add Cribl exporter for traces
        metrics:
          exporters:
            - otlphttp/prometheus
            - debug
            - otlp/cribl  # Add Cribl exporter for metrics
        logs:
          exporters:
            - opensearch
            - debug
            - otlp/cribl  # Add Cribl exporter for logs