# Helm values to configure OpenTelemetry demo with Cribl Stream integration
# This file will be processed by the setup script to substitute variables

# Override individual components with Cribl-built images. Tags are tied to
# commits on long-lived branches in criblio/opentelemetry-demo (see
# docs/opentelemetry-demo-fork.md). For local dev, the image must be built
# and loaded into the kind cluster (kind load docker-image ...) before
# deploy; for shared environments, the image must exist on GHCR.
components:
  load-generator:
    imageOverride:
      repository: ghcr.io/criblio/opentelemetry-demo
      tag: 1fe73d4-load-generator
      pullPolicy: IfNotPresent
    # Browser traffic is heavy in kind — keeps PlaywrightUser disabled.
    # Use envOverrides (name-keyed merge) rather than env: (full-list
    # replace) so the chart's 13 LOCUST_* defaults survive — without
    # them locust idles in `state: ready` with no users.
    envOverrides:
      - name: LOCUST_BROWSER_TRAFFIC_ENABLED
        value: "false"

  # Phase 1b — services with BaggageSpanProcessor wired in to promote
  # session.id from inbound baggage to a span attribute.
  #
  # The cart-readiness-probe attempt (08daf03-cart) is REVERTED.
  # The Http1AndHttp2 Kestrel change in that image broke h2c
  # prior-knowledge gRPC — Go gRPC clients (checkout, frontend BFF
  # going through the cart service path) got
  # `initial http2 frame from server is not a settings frame:
  # *http2.GoAwayFrame` on every call. checkout's persistent
  # connection then stayed half-dead even after a cart revert,
  # cascading into 100% GetCart errors, no orders placed, payment
  # and email starved of traffic.
  #
  # Proper fix is to expose /healthz on a SEPARATE Kestrel
  # endpoint with Protocols Http1 (keeping 8080 as Http2-only for
  # gRPC) — TODO on the cribl/cart-readiness-probe branch.
  cart:
    imageOverride:
      repository: ghcr.io/criblio/opentelemetry-demo
      tag: 0a07691-cart
      pullPolicy: IfNotPresent
  checkout:
    imageOverride:
      repository: ghcr.io/criblio/opentelemetry-demo
      tag: 9e0f6bd-checkout
      pullPolicy: IfNotPresent
  payment:
    imageOverride:
      repository: ghcr.io/criblio/opentelemetry-demo
      tag: 9e0f6bd-payment
      pullPolicy: IfNotPresent
  recommendation:
    imageOverride:
      repository: ghcr.io/criblio/opentelemetry-demo
      tag: 9e0f6bd-recommendation
      pullPolicy: IfNotPresent
  frontend:
    imageOverride:
      repository: ghcr.io/criblio/opentelemetry-demo
      tag: 9e0f6bd-frontend
      pullPolicy: IfNotPresent

  # Lower memory ceiling than the (unset) chart default — product-catalog is
  # a Go service whose footprint matters in the local kind cluster.
  product-catalog:
    resources:
      limits:
        memory: 128Mi
      requests:
        memory: 128Mi

  # Chart default is 250Mi which is too tight for a Node.js BFF at 3
  # replicas absorbing the LoadTestShape 25-user peak. Under V8 GC
  # pressure the pod stalls at the TCP-accept layer — envoy upstream
  # timeouts (UT response flag) fire on /api/products, /api/cart,
  # /api/recommendations, /api/data while the BFF's own server spans
  # report sub-25ms (because those spans only count requests that
  # reach the handler — connection-level stalls are invisible to
  # frontend's span data).
  frontend:
    replicas: 3
    resources:
      limits:
        memory: 512Mi
      requests:
        memory: 256Mi

  # Chart default is 65Mi. Envoy needs that just for its binary
  # footprint plus connection-pool bookkeeping to each upstream
  # cluster. Under sustained load the proxy spent its life
  # memory-pressured: it OOMKilled once (Exit 137) and otherwise
  # constantly ran into envoy's overload manager, dropping new
  # connections (UT/UC/UR response flags). The mistaken diagnosis
  # chain — "envoy 504s, BFF must be slow" — held for an entire
  # day because the proxy's failures presented at upstream-cluster
  # boundaries even though the constraint was the proxy itself.
  # Bumping to 256Mi reduced steady-state 5xx from ~20% to ~2%
  # and eliminated UT/UC entirely over a LoadTestShape cycle.
  frontend-proxy:
    resources:
      limits:
        memory: 256Mi
      requests:
        memory: 128Mi

  # Chart default is 100Mi which postgres 17.6 cannot sustain — OOMKill
  # crashloop under any real query load (203 restarts observed in 20h
  # under demo traffic). Bump to give shared_buffers + WAL + connection
  # backends room to breathe.
  postgresql:
    resources:
      limits:
        memory: 512Mi
      requests:
        memory: 256Mi

  # 256Mi (vs chart default 20Mi) holds the OTLP-cpp exporter buffer
  # under demo load — earlier bumps (20→128) still OOMKilled because
  # of the SimpleLogRecordProcessor synchronous-export bug below.
  # Cribl image carries the BatchLogRecordProcessor patch: drops log
  # records when its queue is full instead of blocking the gRPC
  # handler thread on a 10s OTLP export deadline. Without that
  # patch, any back-pressure in the log pipeline (collector slow,
  # OpenSearch flood-stage block, etc.) cascades into >2000s p50
  # Convert latency and pthread_create exhaustion. See
  # cribl/currency-batch-log-processor in the fork.
  currency:
    imageOverride:
      repository: ghcr.io/criblio/opentelemetry-demo
      tag: 4affae4-currency
      pullPolicy: IfNotPresent
    resources:
      limits:
        memory: 256Mi
      requests:
        memory: 128Mi

  # Memory: chart default 120Mi → 256Mi (first bump) → 512Mi (Exit 137
  # observed at 256Mi too). .NET runtime + Confluent.Kafka + EF Core +
  # Npgsql + OTel SDK is heavier than expected.
  #
  # Image: cribl/accounting-idempotency fork branch fixes the
  # correctness half of the bug — every OOMKill in the past was
  # replaying kafka messages whose orders were already written to
  # Postgres, hitting order_pkey 23505 on insert. The fork:
  #   - Pre-checks Orders.Any(o => o.Id == order.OrderId)
  #   - Catches DbUpdateException with SqlState 23505 as idempotent
  #   - EnableAutoCommit=false + manual _consumer.Commit on success
  # Without the patch the memory bump only masks the symptom; the
  # next consumer rebalance reintroduces the 23505 storm.
  accounting:
    imageOverride:
      repository: ghcr.io/criblio/opentelemetry-demo
      tag: dd3c7c9-accounting
      pullPolicy: IfNotPresent
    resources:
      limits:
        memory: 512Mi
      requests:
        memory: 256Mi

opentelemetry-collector:
  # Chart default 200Mi gets OOMKilled aggregating trace/metric/log
  # pipelines for the whole demo at LoadTestShape peak — observed
  # exit-code-137 restarts plus intermittent liveness-probe timeouts.
  # When the collector dies, all service OTel SDKs back up briefly,
  # which has cascaded into front-end TCP-accept stalls and the
  # mysterious "envoy 504 with no downstream errors" pattern.
  resources:
    limits:
      memory: 1Gi
    requests:
      memory: 512Mi

  config:
    exporters:
      # Base chart exporters that pipelines reference
      otlp:
        endpoint: jaeger:4317
        tls:
          insecure: true
      debug: {}
      opensearch:
        http:
          endpoint: http://opensearch:9200
          tls:
            insecure: true
        logs_index: otel
      otlphttp/prometheus:
        endpoint: http://prometheus:9090/api/v1/otlp
        tls:
          insecure: true
      # Cribl Stream exporter
      otlp/cribl:
        endpoint: "https://__CRIBL_ENDPOINT__"
        headers:
          authorization: "Basic __AUTH_HEADER__"
        tls:
          insecure: false
    
    service:
      pipelines:
        traces:
          exporters:
            - otlp
            - debug
            - spanmetrics
            - otlp/cribl  # Add Cribl exporter for traces
        metrics:
          exporters:
            - otlphttp/prometheus
            - debug
            - otlp/cribl  # Add Cribl exporter for metrics
        logs:
          exporters:
            - opensearch
            - debug
            - otlp/cribl  # Add Cribl exporter for logs